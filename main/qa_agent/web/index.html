<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfoTest Engine</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1b26; color: #c0caf5; font-family: system-ui, sans-serif; height: 100vh; overflow: hidden; }
#loginPage { display: flex; align-items: center; justify-content: center; height: 100vh; }
.login-box { background: #24283b; border: 1px solid #414868; border-radius: 8px; padding: 2rem; width: 320px; }
.login-box h2 { margin-bottom: 1.5rem; color: #7aa2f7; font-size: 1.1rem; font-family: monospace; }
.login-box input { width: 100%; padding: 0.6rem; margin-bottom: 0.8rem; background: #1a1b26; border: 1px solid #414868; border-radius: 4px; color: #c0caf5; font-family: monospace; }
.login-box input:focus { outline: none; border-color: #7aa2f7; }
.login-box button { width: 100%; padding: 0.6rem; background: #7aa2f7; color: #1a1b26; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
.login-box button:hover { background: #89b4fa; }
.login-error { color: #f7768e; font-size: 0.8rem; margin-top: 0.5rem; }
#termPage { display: none; height: 100vh; flex-direction: column; }
#toolbar { padding: 4px 8px; background: #24283b; border-bottom: 1px solid #414868; display: flex; align-items: center; gap: 8px; }
#toolbar .upload-btn { background: #414868; border: none; color: #c0caf5; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
#toolbar .upload-btn:hover { background: #565f89; }
#toolbar .status { color: #9ece6a; font-size: 0.8rem; }
#terminal { flex: 1; }
</style>
</head>
<body>
<div id="loginPage">
  <div class="login-box">
    <h2>InfoTest Engine v1.0.0</h2>
    <input type="text" id="username" placeholder="用户名" autocomplete="off">
    <input type="password" id="password" placeholder="密码">
    <button onclick="doLogin()">登录</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>
<div id="termPage">
  <div id="toolbar">
    <input type="file" id="fileInput" hidden>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📎 上传文件</button>
    <span class="status" id="uploadStatus"></span>
  </div>
  <div id="terminal"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script>
let token = '';
let ws = null;
let term = null;
let fitAddon = null;

async function doLogin() {
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  try {
    const r = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u,password:p})});
    if (!r.ok) { document.getElementById('loginError').textContent = '用户名或密码错误'; return; }
    const d = await r.json();
    token = d.token;
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('termPage').style.display = 'flex';
    initTerminal();
  } catch(e) { document.getElementById('loginError').textContent = '连接失败'; }
}

function initTerminal() {
  term = new Terminal({
    cursorBlink: true,
    fontSize: 14,
    fontFamily: "'SF Mono', 'Cascadia Code', 'Consolas', monospace",
    theme: { background: '#1a1b26', foreground: '#c0caf5', cursor: '#7aa2f7' },
  });
  fitAddon = new FitAddon.FitAddon();
  term.loadAddon(fitAddon);
  term.open(document.getElementById('terminal'));
  fitAddon.fit();

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/terminal`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    ws.send(JSON.stringify({token, cols: term.cols, rows: term.rows}));
  };
  ws.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      term.write(new Uint8Array(e.data));
    } else {
      const d = JSON.parse(e.data);
      if (d.type === 'error') { term.write('\r\n\x1b[31m' + d.msg + '\x1b[0m\r\n'); }
    }
  };
  ws.onclose = () => { term.write('\r\n\x1b[2m[连接已断开]\x1b[0m\r\n'); };

  term.onData((data) => { if (ws && ws.readyState === 1) ws.send(new Blob([data])); });
  term.onBinary((data) => { if (ws && ws.readyState === 1) ws.send(new Blob([data])); });

  window.addEventListener('resize', () => {
    fitAddon.fit();
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({type:'resize', cols:term.cols, rows:term.rows}));
    }
  });
}

// 文件上传
document.getElementById('fileInput')?.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  document.getElementById('uploadStatus').textContent = '上传中...';
  const r = await fetch('/api/upload?token=' + encodeURIComponent(token), {method:'POST', body:fd});
  const d = await r.json();
  if (d.path) {
    document.getElementById('uploadStatus').textContent = '✓ ' + (d.filename || file.name);
    // 将沙箱路径注入终端输入
    if (ws && ws.readyState === 1) {
      ws.send(new Blob([d.path]));
    }
  } else {
    document.getElementById('uploadStatus').textContent = '上传失败';
  }
  e.target.value = '';
});

// 拖拽上传
document.getElementById('termPage')?.addEventListener('dragover', (e) => e.preventDefault());
document.getElementById('termPage')?.addEventListener('drop', async (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  document.getElementById('uploadStatus').textContent = '上传中...';
  const r = await fetch('/api/upload?token=' + encodeURIComponent(token), {method:'POST', body:fd});
  const d = await r.json();
  if (d.path) {
    document.getElementById('uploadStatus').textContent = '✓ ' + (d.filename || file.name);
    if (ws && ws.readyState === 1) ws.send(new Blob([d.path]));
  } else {
    document.getElementById('uploadStatus').textContent = '上传失败';
  }
});

document.getElementById('password')?.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
